<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar</title>

    <style>
        body {
            padding-top: 70px;
        }

        .main-header {
            display: flex;
            /* Habilita Flexbox para el header */
            justify-content: space-between;
            /* Distribuye el espacio entre los elementos (logo, nav, botón) */
            align-items: center;
            /* Centra los elementos verticalmente */
            background-color: #333;
            color: white;
            padding: 10px 20px;

            position: fixed;
            /* Mantiene el header en su lugar */
            top: 0;
            /* Lo pega al borde superior */
            left: 0;
            /* Alinea al borde izquierdo */
            width: 90%;
            /* Asegura que ocupe todo el ancho */
            z-index: 1000;
            /* Asegura que esté por encima de otros elementos */

            height: 60px;
        }

        .logo {
            font-size: 1.5em;
            font-weight: bold;
        }

        input {
            width: 100%;
            height: 28px;
        }



        .header-button {
            background-color: #007bff;
            /* Color de fondo del botón */
            color: white;
            /* Color del texto */
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            /* Esquinas redondeadas */
            cursor: pointer;
            /* Cambia el cursor a una mano */
        }

        .card {
            border: 1px solid black;
            border-radius: 3px;
            margin: 4px;
            padding: 4px;
        }

        p {
            margin: 4px;
            padding: 4px;
        }

        a {
            text-decoration: none;
        }

        .btn-full {
  /* Ancho total */
  width: 100%;
  display: block;
  box-sizing: border-box; /* Asegura que el padding no aumente el ancho total */
  
  /* Color y diseño más bonito */
  background-color: #4CAF50; /* Un verde vibrante */
  color: white;
  padding: 15px 20px;
  font-size: 16px;
  border: none;
  border-radius: 8px; /* Esquinas suaves */
  cursor: pointer;
  transition: background-color 0.3s ease; /* Transición suave */
  font-weight: bold;
}

/* Efecto al pasar el mouse (hover) */
.btn-full:hover {
  background-color: #45a049; /* Verde un poco más oscuro */
}

    </style>
</head>

<body>
    <header class="main-header">
        <div class="logo"><input type="number" id="inputSearch"></div>
        <button class="header-button" type="button" onclick="buscar()">🔍</button>
    </header>

    <div class="contenedor">

    </div>



    <script src="script1.js"></script>
    <script src="script2.js"></script>
</body>

</html>
